# AI-searchable metadata for template discovery
metadata:
  description: Minimal Debian 13 image for ARM64 (aarch64) architecture
  use_cases:
    - ARM64 bare metal deployments
    - Single-board computers (SBC)
    - ARM64 cloud instances
    - Edge computing on ARM64 devices
  keywords:
    - minimal
    - lightweight
    - arm64
    - aarch64
    - debian
    - sbcs
    - edge

image:
  name: minimal-os-image-debian-arm64
  version: "13.0"

target:
  os: debian
  dist: debian13
  arch: aarch64
  imageType: raw

disk:
  name: Minimal_Raw_ARM64 # 1:1 mapping to the systemConfigs name
  artifacts:
    -
      type: raw  # image file format, valid value [raw, vhd, vhdx, qcow2, vmdk, vdi]
      compression: gz # image compression format (optional)
  size: 4GiB # 4G, 4GB, 4096 MiB also valid. (Required for raw)
  partitionTableType: gpt # Partition table type, valid value: [gpt, mbr]
  partitions: # Required for raw, optional for ISO, not needed for rootfs.
    - id: boot
      type: esp
      flags:
        - esp
        - boot
      start: 1MiB
      end: 513MiB
      fsType: fat32
      mountPoint: /boot/efi
      mountOptions: umask=0077

    - id: rootfs
      type: linux-root-arm64
      start: 513MiB
      end: "0"
      fsType: ext4
      mountPoint: /
      mountOptions: defaults

systemConfig:
  name: minimal-arm64
  description: Minimal debian image for ARM64

  bootloader:
    bootType: efi
    provider: grub

  immutability:
    enabled: false

  packages:
    - base-files
    - grub-efi-arm64-signed
    - initramfs-tools
    - grub2-common
    - grub-efi-arm64
    - grub-efi-arm64-bin
    - systemd
    - openssh-server
    - systemd-resolved
    - systemd-timesyncd

  kernel:
    version: "6.13"
    cmdline: "console=ttyS0,115200 console=tty0 loglevel=7"
    packages:
      - linux-image-generic
