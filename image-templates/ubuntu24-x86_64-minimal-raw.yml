# AI-searchable metadata for template discovery
metadata:
  description: Minimal Ubuntu 24.04 image with essential packages for lightweight deployments
  use_cases:
    - Lightweight Ubuntu base image
    - Cloud instances
    - Development environments
    - Container hosts
  keywords:
    - minimal
    - lightweight
    - base
    - ubuntu
    - cloud
    - development

image:
  name: minimal-os-image-ubuntu
  version: "24.04"

target:
  os: ubuntu
  dist: ubuntu24
  arch: x86_64
  imageType: raw

disk:
  name: Minimal_Raw # 1:1 mapping to the systemConfigs name
  artifacts:
    -
      type: raw  # image file format, valid value [raw, vhd, vhdx, qcow2, vmdk, vdi]
      compression: gz # image compression format (optional)
    - type: vhdx
  size: 4GiB # 4G, 4GB, 4096 MiB also valid. (Required for raw)
  partitionTableType: gpt # Partition table type, valid value: [gpt, mbr]
  partitions: # Required for raw, optional for ISO, not needed for rootfs.
    - id: boot
      type: esp
      flags:
        - esp
        - boot
      start: 1MiB
      end: 513MiB
      fsType: fat32
      mountPoint: /boot/efi
      mountOptions: umask=0077

    - id: rootfs
      type: linux-root-amd64
      start: 513MiB
      end: "0"
      fsType: ext4
      mountPoint: /
      mountOptions: defaults

systemConfig:

  users:
    # Development user with plaintext password (NOT for production)
    - name: user
      password: "user"  # Do not commit real plaintext passwords
      groups: ["sudo"]


  name: minimal
  description: Minimal ubuntu image

  bootloader:
    bootType: efi
    provider: grub

  immutability:
    enabled: false # default is true
    # To enable Secure Boot, provide the actual file paths for your environment below and uncomment the relevant lines.
    # secureBootDBKey: "<SECURE_BOOT_DB_KEY_PATH>"
    # secureBootDBCrt: "<SECURE_BOOT_DB_CRT_PATH>"
    # secureBootDBCer: "<SECURE_BOOT_DB_CER_PATH>"

  packages:
    - ubuntu-minimal
    - grub-efi-amd64-signed
    - initramfs-tools
    - grub2-common
    - grub-pc-bin
    - grub-efi-amd64
    - grub-efi-amd64-bin
    - systemd
    - openssh-server
    - systemd-resolved
    - systemd-timesyncd
    - dkms

  configurations:
    # ── Generic DKMS modules first-boot installation ─────────────────
    # DKMS packages require a live kernel for module builds and cannot
    # be compiled inside chroot. This creates a systemd oneshot service
    # that installs all DKMS modules on first boot, then disables itself.
    - cmd: "printf '#!/bin/bash\\nset -euo pipefail\\nexport DEBIAN_FRONTEND=noninteractive\\n\\n# List of DKMS packages to install\\nDKMS_PACKAGES=(\\n  \"v4l2loopback-dkms\"\\n  # Add more DKMS packages here as needed:\\n  # \"nvidia-dkms-525\"\\n  # \"virtualbox-dkms\"\\n  # \"broadcom-sta-dkms\"\\n)\\n\\necho \"Installing DKMS packages...\"\\napt-get update || { echo \"Failed to update package list\"; exit 1; }\\n\\nfor package in \"${DKMS_PACKAGES[@]}\"; do\\n  if [[ ! \"$package\" =~ ^[[:space:]]*# ]] && [[ -n \"$package\" ]]; then\\n    echo \"Installing $package...\"\\n    if apt-get install -y \"$package\"; then\\n      echo \"✓ Successfully installed $package\"\\n    else\\n      echo \"✗ Failed to install $package\"\\n    fi\\n  fi\\ndone\\n\\necho \"DKMS installation complete.\"\\necho \"Cleaning up installation service...\"\\nsystemctl disable install-dkms-modules.service\\nrm -f /etc/systemd/system/install-dkms-modules.service\\nrm -f /usr/local/bin/install-dkms-modules.sh\\necho \"Cleanup complete.\"\\n' > /usr/local/bin/install-dkms-modules.sh"
    - cmd: "chmod 755 /usr/local/bin/install-dkms-modules.sh"
    - cmd: "printf '[Unit]\\nDescription=Install DKMS modules (first boot)\\nAfter=network-online.target\\nWants=network-online.target\\nConditionPathExists=/usr/local/bin/install-dkms-modules.sh\\n\\n[Service]\\nType=oneshot\\nExecStart=/usr/local/bin/install-dkms-modules.sh\\nEnvironment=DEBIAN_FRONTEND=noninteractive\\nTimeoutStartSec=0\\n\\n[Install]\\nWantedBy=multi-user.target\\n' > /etc/systemd/system/install-dkms-modules.service"
    - cmd: "systemctl enable install-dkms-modules.service"

  kernel:
    version: "6.17"
    cmdline: "console=ttyS0,115200 console=tty0 loglevel=7"
    packages:
      - linux-image-generic-hwe-24.04
