# AI-searchable metadata for template discovery
metadata:
  description: Minimal Ubuntu 24.04 image with essential packages for lightweight deployments
  use_cases:
    - Lightweight Ubuntu base image
    - Cloud instances
    - Development environments
    - Container hosts
  keywords:
    - minimal
    - lightweight
    - base
    - ubuntu
    - cloud
    - development

image:
  name: minimal-os-image-ubuntu
  version: "24.04"

# Full disk config copied from default-raw-x86_64.yml with compression removed
# for fair benchmark comparison with mkosi (default is gz).
# The disk section fully replaces the default during merge, so all fields are required.
disk:
  name: minimal
  artifacts:
    - type: raw
  size: 6GiB
  partitionTableType: gpt
  partitions:
    - id: boot
      type: esp
      flags:
        - esp
        - boot
      start: 1MiB
      end: 513MiB
      fsType: fat32
      mountPoint: /boot/efi
      mountOptions: umask=0077
    - id: rootfs
      type: linux-root-amd64
      start: 513MiB
      end: 4557MiB
      fsType: ext4
      mountPoint: /
      mountOptions: defaults
    - id: roothashmap
      type: linux
      start: 4557MiB
      end: 5057MiB
      fsType: ext4
      mountPoint: none
    - id: userdata
      type: linux
      start: 5057MiB
      end: "0"
      fsType: ext4
      mountPoint: /opt

target:
  os: ubuntu
  dist: ubuntu24
  arch: x86_64
  imageType: raw

# Sample list of additional package repositories; replace codename, url, and pkey values as needed
packageRepositories:
  - codename: "company-internal"
    url: "<URL>"
    pkey: "<PUBLIC_KEY_URL>" # Uncomment and replace in real config
    component: "main"

  - codename: "dev-tools"
    url: "<URL>"
    pkey: "<PUBLIC_KEY_URL>" # Uncomment and replace in real config

  - codename: "intel-openvino"
    url: "<URL>"
    pkey: "<PUBLIC_KEY_URL>" # Uncomment and replace in real config
    component: "restricted"

systemConfig:
  name: minimal
  description: Minimal ubuntu image

  immutability:
    enabled: false # default is true
    # To enable Secure Boot, provide the actual file paths for your environment below and uncomment the relevant lines.
    # secureBootDBKey: "<SECURE_BOOT_DB_KEY_PATH>"
    # secureBootDBCrt: "<SECURE_BOOT_DB_CRT_PATH>"
    # secureBootDBCer: "<SECURE_BOOT_DB_CER_PATH>"

  packages:
    - ubuntu-minimal
    - systemd-boot
    - dracut-core
    - systemd
    - cryptsetup-bin
    - openssh-server
    - systemd-resolved
    - systemd-timesyncd

  kernel:
    version: "6.14"
    cmdline: "console=ttyS0,115200 console=tty0 loglevel=7"
    packages:
      - linux-image-generic-hwe-24.04
