# mkosi v25 configuration equivalent to ubuntu24-x86_64-minimal-raw.yml
#
# Uses systemd-repart for native 4-partition GPT layout (no postprocess.sh needed)
# Uses ToolsTree=default to get a modern systemd-repart on older hosts (Ubuntu 22.04)
#
# Usage:
#   mkosi -f build          # build the image (all 4 partitions natively)
#   mkosi summary           # preview configuration
#   mkosi shell             # interactive shell in the image
#   mkosi qemu              # boot in QEMU (if qemu installed)

[Distribution]
Distribution=ubuntu
Release=noble
Architecture=x86-64
Repositories=universe
Repositories=multiverse

[Build]
# Use a default tools tree so mkosi gets systemd-repart >= 254
# even though the host (Ubuntu 22.04) only has systemd 249
ToolsTree=default
WithNetwork=yes

[Output]
# disk = GPT image built by systemd-repart using mkosi.repart/ definitions
Format=disk
ImageId=minimal-os-image-ubuntu
ImageVersion=24.04
CompressOutput=no
ManifestFormat=json

[Content]
Bootable=yes
Bootloader=systemd-boot
KernelCommandLine=console=ttyS0,115200 console=tty0 loglevel=7
Autologin=yes
Hostname=minimal

Packages=
    ubuntu-minimal
    systemd-boot
    dracut-core
    systemd
    cryptsetup-bin
    openssh-server
    systemd-resolved
    systemd-timesyncd
    efibootmgr
    ethtool
    linux-image-generic-hwe-24.04
    gawk
