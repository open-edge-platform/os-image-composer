image:
  name: minimal-os-image-debian
  version: "13.0"

target:
  os: debian # Target OS name
  dist: debian13 # Target OS distribution
  arch: x86_64 # Target OS architecture
  imageType: img # Image type, valid value: [raw, iso, img].

systemConfig:
  name: Default_INITRD
  description: Default yml configuration for initrd/initramfs image

  immutability:
    enabled: false

  packages:
    - base-files
    - dracut-core
    - systemd
    - openssh-server
    - systemd-resolved
    - systemd-timesyncd
    - linux-image-generic

  kernel:
    version: "6.13"
    cmdline: "console=ttyS0,115200 console=tty0 loglevel=7"
    packages:
      - linux-image-generic
